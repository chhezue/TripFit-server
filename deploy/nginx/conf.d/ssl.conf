# api.tripfit.online — HTTPS (Spring Boot app:8080)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.tripfit.online;

    ssl_certificate     /etc/letsencrypt/live/api.tripfit.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tripfit.online/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Docker embedded DNS — app 호스트명을 요청 시점에 해석
    resolver 127.0.0.11 ipv6=off valid=10s;

    include /etc/nginx/snippets/proxy-api.conf;
}
