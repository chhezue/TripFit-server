# api.tripfit.online — HTTP
# 1) Let's Encrypt ACME webroot
# 2) /health (로드밸런서·배포 스크립트)
# 3) 나머지 → HTTPS 리다이렉트

server {
    listen 80;
    listen [::]:80;
    server_name api.tripfit.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location / {
        return 301 https://api.tripfit.online$request_uri;
    }
}
