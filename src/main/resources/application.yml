spring:
  profiles:
    default: local
  application:
    name: tripfit
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 1800000
      keepalive-time: 300000
      connection-timeout: 30000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

tripfit:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-must-be-at-least-32-chars}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:7200}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}
  oauth:
    google-client-id: ${GOOGLE_CLIENT_ID:}
    google-client-id-ios: ${GOOGLE_CLIENT_ID_IOS:}
    google-client-id-android: ${GOOGLE_CLIENT_ID_ANDROID:}
    apple-client-id: ${APPLE_CLIENT_ID:}
