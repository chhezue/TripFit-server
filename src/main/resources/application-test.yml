spring:
  datasource:
    url: jdbc:h2:mem:tripfit;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

tripfit:
  jwt:
    secret: test-jwt-secret-key-at-least-32-characters
    access-expiration-seconds: 7200
    refresh-expiration-days: 30
  oauth:
    google-client-id: test-google-client-id
    google-client-id-ios: test-google-ios-client-id
    google-client-id-android: test-google-android-client-id
    apple-client-id: test-apple-client-id
