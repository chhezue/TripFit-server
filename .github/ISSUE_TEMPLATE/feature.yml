name: Feature
description: 새 API, 엔티티, 비즈니스 기능
title: "[area] "
labels:
  - "kind: feature"
body:
  - type: markdown
    attributes:
      value: |
        계획 축: [`docs/product/waves.md`](../../docs/product/waves.md) — **wave 1~4** 중 하나.
        DB·인증·다파일 변경 시 merge 전 [`docs/specs/`](../../docs/specs/) 스펙 링크 필요.

  - type: dropdown
    id: wave
    attributes:
      label: wave (개발 물결)
      options:
        - "1 — 기반"
        - "2 — 핵심"
        - "3 — 마무리"
        - "4 — 이후"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 영역 (area)
      options:
        - api
        - domain
        - deploy
        - docs
        - infra
    validations:
      required: true

  - type: input
    id: spec
    attributes:
      label: 스펙 문서 (해당 시)
      description: "예: docs/specs/trip-room-create.md"
      placeholder: docs/specs/...

  - type: textarea
    id: goal
    attributes:
      label: 목표 (한 문장)
      placeholder: 방장이 여행방을 생성하고 초대 코드를 받을 수 있다.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 요구사항 / 완료 기준
      placeholder: |
        - [ ] API POST /api/v1/trips
        - [ ] ./gradlew test 통과

  - type: textarea
    id: notes
    attributes:
      label: 비고
      placeholder: 의존 이슈 #번호
