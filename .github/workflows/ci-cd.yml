name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tripfit-server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon -x test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "full=${{ env.REGISTRY }}/${owner}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.full }}:${{ github.sha }}
            ${{ steps.image.outputs.full }}:latest

      - name: Deploy to EC2 A
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_IMAGE: ${{ steps.image.outputs.full }}:latest
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PAT,GHCR_IMAGE,GHCR_USERNAME,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD
          script: |
            set -euo pipefail
            if [[ -z "${GHCR_PAT:-}" ]]; then
              echo "FAIL: GHCR_PAT secret is required (org packages are private)"
              exit 1
            fi
            docker logout ghcr.io 2>/dev/null || true
            ghcr_user="${GHCR_USERNAME:-${{ github.actor }}}"
            echo "$GHCR_PAT" | docker login ghcr.io -u "$ghcr_user" --password-stdin
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            ghcr_image="${GHCR_IMAGE:-}"
            db_user="${SPRING_DATASOURCE_USERNAME:-}"
            db_pass="${SPRING_DATASOURCE_PASSWORD:-}"
            if [[ -f .env ]]; then
              set -a
              # shellcheck disable=SC1091
              source .env
              set +a
            fi
            export GHCR_IMAGE="${ghcr_image:-$GHCR_IMAGE}"
            export SPRING_DATASOURCE_USERNAME="${db_user:?SPRING_DATASOURCE_USERNAME secret is required}"
            export SPRING_DATASOURCE_PASSWORD="${db_pass:?SPRING_DATASOURCE_PASSWORD secret is required}"
            docker compose pull app
            docker compose up -d app
            app_port="${APP_PORT:-8080}"
            for i in $(seq 1 24); do
              if curl -fsS "http://localhost:${app_port}/actuator/health/readiness" >/dev/null 2>&1; then
                echo "OK readiness"
                exit 0
              fi
              sleep 5
            done
            echo "FAIL readiness timeout"
            docker logs tripfit-app 2>&1 | tail -80
            exit 1
