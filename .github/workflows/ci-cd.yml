name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tripfit-server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Check code format
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon -x test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: image
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "full=${{ env.REGISTRY }}/${owner}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.full }}:${{ github.sha }}
            ${{ steps.image.outputs.full }}:latest

      - name: Deploy to EC2 A
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_IMAGE: ${{ steps.image.outputs.full }}:latest
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_ID_IOS: ${{ secrets.GOOGLE_CLIENT_ID_IOS }}
          GOOGLE_CLIENT_ID_ANDROID: ${{ secrets.GOOGLE_CLIENT_ID_ANDROID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PAT,GHCR_IMAGE,GHCR_USERNAME,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_ID_IOS,GOOGLE_CLIENT_ID_ANDROID,APPLE_CLIENT_ID
          script: |
            set -euo pipefail
            if [[ -z "${GHCR_PAT:-}" ]]; then
              echo "FAIL: GHCR_PAT secret is required (org packages are private)"
              exit 1
            fi
            docker logout ghcr.io 2>/dev/null || true
            ghcr_user="${GHCR_USERNAME:-${{ github.actor }}}"
            echo "$GHCR_PAT" | docker login ghcr.io -u "$ghcr_user" --password-stdin
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            repo_root="$(cd ../.. && pwd)"
            echo "syncing deploy config from ${repo_root}"
            # Deploy host repo should mirror origin/main exactly.
            git -C "$repo_root" fetch --prune origin main
            git -C "$repo_root" checkout -B main origin/main
            ghcr_image="${GHCR_IMAGE:-}"
            db_user="${SPRING_DATASOURCE_USERNAME:-}"
            db_pass="${SPRING_DATASOURCE_PASSWORD:-}"
            jwt_secret="${JWT_SECRET:-}"
            google_client_id="${GOOGLE_CLIENT_ID:-}"
            google_client_id_ios="${GOOGLE_CLIENT_ID_IOS:-}"
            google_client_id_android="${GOOGLE_CLIENT_ID_ANDROID:-}"
            apple_client_id="${APPLE_CLIENT_ID:-}"
            if [[ -f .env ]]; then
              set -a
              # shellcheck disable=SC1091
              source .env
              set +a
            fi
            export GHCR_IMAGE="${ghcr_image:-$GHCR_IMAGE}"
            export SPRING_DATASOURCE_USERNAME="${db_user:?SPRING_DATASOURCE_USERNAME secret is required}"
            export SPRING_DATASOURCE_PASSWORD="${db_pass:?SPRING_DATASOURCE_PASSWORD secret is required}"
            export JWT_SECRET="${jwt_secret:?JWT_SECRET secret is required}"
            export GOOGLE_CLIENT_ID="${google_client_id:-}"
            export GOOGLE_CLIENT_ID_IOS="${google_client_id_ios:-}"
            export GOOGLE_CLIENT_ID_ANDROID="${google_client_id_android:-}"
            export APPLE_CLIENT_ID="${apple_client_id:-}"
            docker compose pull app
            # ec2-deploy-app.sh 와 동일: nginx 443 기동용 TLS material 보장
            ../../scripts/ensure-ssl-certs.sh
            docker compose up -d
            app_port="${APP_PORT:-8080}"
            nginx_port="${NGINX_HTTP_PORT:-80}"
            # app healthcheck start_period 90s + nginx depends_on — 120s(24×5)는 부족
            for i in $(seq 1 48); do
              app_ok=false
              nginx_ok=false
              if curl -fsS "http://localhost:${app_port}/actuator/health/readiness" >/dev/null 2>&1; then
                app_ok=true
              fi
              if curl -fsS "http://localhost:${nginx_port}/health" >/dev/null 2>&1; then
                nginx_ok=true
              fi
              if [[ "$app_ok" == true && "$nginx_ok" == true ]]; then
                echo "OK nginx + app readiness"
                exit 0
              fi
              echo "wait ${i}/48 — app=${app_ok} nginx=${nginx_ok}"
              sleep 5
            done
            echo "FAIL readiness timeout"
            docker compose ps -a
            if docker inspect tripfit-app >/dev/null 2>&1; then
              docker inspect tripfit-app --format 'app health={{.State.Health.Status}}'
              docker logs tripfit-app 2>&1 | tail -80
            else
              echo "WARN: tripfit-app container not found"
            fi
            if docker inspect tripfit-nginx >/dev/null 2>&1; then
              docker inspect tripfit-nginx --format 'nginx health={{.State.Health.Status}}'
              docker logs tripfit-nginx 2>&1 | tail -40
            else
              echo "WARN: tripfit-nginx not started (waits for app healthy — check app logs/DB)"
            fi
            exit 1
